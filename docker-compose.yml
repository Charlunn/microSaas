version: "3.9"

services:
  main-landing:
    build:
      context: .
      dockerfile: apps/main-landing/Dockerfile
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3000
    expose:
      - "3000"
    restart: unless-stopped

  reverse-proxy:
    image: nginx:1.27-alpine
    depends_on:
      - main-landing
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${APP_HTTP_PORT:-80}:80"
    restart: unless-stopped
